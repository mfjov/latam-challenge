name: 'Continuous Delivery'

on:
  workflow_run:
    workflows: ['Continuous Integration']
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/delay-api:${{ github.sha }} .

      - name: Push Docker image
        run: docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/delay-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy delay-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/delay-api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10
